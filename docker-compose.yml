version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - taskgrid_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/taskgrid.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  taskgrid_data:
